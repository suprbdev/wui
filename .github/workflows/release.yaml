name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  GO_VERSION: "1.26.4"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Vet
        run: go vet ./...
      - name: Vet (WASM)
        run: GOOS=js GOARCH=wasm go vet .
      - name: Tests (race)
        run: go test -race ./...
      # Library-only release: no binaries are shipped; consumers pull the
      # module via `go get github.com/suprbdev/wui@<tag>`.
      - name: Create GitHub release
        # Skipped under act (local workflow testing); act sets ACT=true.
        if: ${{ !env.ACT }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
