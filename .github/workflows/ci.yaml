name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GO_VERSION: "1.26.4"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Vet
        run: go vet ./...
      - name: Vet (WASM)
        run: GOOS=js GOARCH=wasm go vet .
      - name: Tests (race)
        run: go test -race ./...
